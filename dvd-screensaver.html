<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DVD Loading Screensaver</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      background: #000;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
    }

    #container {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #logo {
      position: absolute;
      width: 180px;
      height: 80px;
      font-size: 48px;
      font-weight: bold;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      text-shadow: 3px 3px 8px rgba(0,0,0,0.8);
      user-select: none;
      pointer-events: none;
      transition: color 0.4s ease;
    }

    .corner {
      position: absolute;
      width: 20px;
      height: 20px;
      background: transparent;
    }

    #tl { top: 0;    left: 0; }
    #tr { top: 0;    right: 0; }
    #bl { bottom: 0; left: 0; }
    #br { bottom: 0; right: 0; }
  </style>
</head>
<body>

<div id="container">
  <div id="logo">DVD</div>

  <!-- invisible corner detectors -->
  <div class="corner" id="tl"></div>
  <div class="corner" id="tr"></div>
  <div class="corner" id="bl"></div>
  <div class="corner" id="br"></div>
</div>

<script>
  const logo = document.getElementById('logo');
  const colors = [
    '#ff0000', '#00ff00', '#0000ff', '#ffff00',
    '#ff00ff', '#00ffff', '#ff8000', '#8000ff'
  ];

  let x = Math.random() * (window.innerWidth - 180);
  let y = Math.random() * (window.innerHeight - 80);
  let dx = 2.8;   // speed x
  let dy = 2.8;   // speed y

  function randomColor() {
    return colors[Math.floor(Math.random() * colors.length)];
  }

  let currentColor = randomColor();
  logo.style.color = currentColor;

  function animate() {
    x += dx;
    y += dy;

    // bounce on edges
    if (x <= 0 || x >= window.innerWidth - logo.offsetWidth) {
      dx = -dx;
      logo.style.color = randomColor();
    }

    if (y <= 0 || y >= window.innerHeight - logo.offsetHeight) {
      dy = -dy;
      logo.style.color = randomColor();
    }

    logo.style.left = x + 'px';
    logo.style.top  = y + 'px';

    requestAnimationFrame(animate);
  }

  // restart on resize (keeps it centered-ish)
  window.addEventListener('resize', () => {
    x = Math.min(x, window.innerWidth - logo.offsetWidth);
    y = Math.min(y, window.innerHeight - logo.offsetHeight);
  });

  // start!
  animate();
</script>

</body>
</html>
